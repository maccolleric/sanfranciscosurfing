  <style>
    /* VIDEO PAGE FILTER */
    .video-page-hero {
      background: var(--deep);
      padding: 5rem 2rem 0;
      text-align: center;
      color: var(--white);
    }

    .video-page-hero .section-label { color: var(--sand); margin-bottom: 0.75rem; }

    .video-page-hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .video-page-hero .subtitle {
      font-family: 'Crimson Pro', Georgia, serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--foam);
      margin-bottom: 0;
    }

    /* FILTER BAR */
    .video-filter-bar {
      background: var(--deep);
      padding: 1.75rem 2rem 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }

    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7aaabb;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.6rem 1.25rem 1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -2px;
    }

    .filter-btn:hover { color: var(--foam); }

    .filter-btn.active {
      color: var(--sand);
      border-bottom-color: var(--sun);
    }

    /* VIDEO GRID AREA */
    .video-page-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .video-section {
      margin-bottom: 4rem;
    }

    .video-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--deep);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--foam);
    }

    .video-section.hidden { display: none; }

    .video-empty {
      font-family: 'Crimson Pro', Georgia, serif;
      font-style: italic;
      color: #999;
      font-size: 1.05rem;
      padding: 2rem 0;
    }

    .video-share {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--foam);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1rem;
      color: #666;
    }

    /* HOW TO ADD comment block */
    .video-add-note {
      background: var(--foam);
      border-left: 3px solid var(--wave);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: #4a6a7a;
      line-height: 1.8;
    }

    @media (max-width: 768px) {
      .video-filter-bar { gap: 0; padding: 1rem 1rem 0; }
      .filter-btn { padding: 0.5rem 0.75rem 0.85rem; font-size: 0.62rem; }
      .video-page-content { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>

<script src="js/layout.js"></script>
<script>
  const filterBtns = document.querySelectorAll('.filter-btn');
  const videoSections = document.querySelectorAll('.video-section');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;

      // Update active button
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Show/hide sections
      videoSections.forEach(section => {
        if (filter === 'all' || section.dataset.location === filter) {
          section.classList.remove('hidden');
        } else {
          section.classList.add('hidden');
        }
      });
    });
  });
</script>
